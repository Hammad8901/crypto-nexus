workflows:

  ios-free-build:
    name: iOS Free Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS (unsigned)
        script: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r CryptoNexus.ipa Payload/
          echo "IPA packaged successfully"

    artifacts:
      - build/ios/iphoneos/CryptoNexus.ipa
      - build/ios/iphoneos/Runner.app

    publishing:
      email:
        recipients:
          - hammad.ahmed0566@gmail.com
        notify:
          success: true
          failure: true
