workflows:

  ios-free-build:
    name: iOS Free Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.22.3
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.cryptonexus.app"

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build unsigned iOS
        script: |
          flutter build ios --release --no-codesign

      - name: Export IPA
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p "$CM_BUILD_DIR/ipa"
          cp -r "$CM_BUILD_DIR/Runner.xcarchive/Products/Applications/Runner.app" \
            "$CM_BUILD_DIR/ipa/"
          cd "$CM_BUILD_DIR/ipa"
          mkdir Payload
          mv Runner.app Payload/
          zip -r CryptoNexus.ipa Payload

    artifacts:
      - $CM_BUILD_DIR/ipa/CryptoNexus.ipa
      - $CM_BUILD_DIR/Runner.xcarchive/Products/Applications/Runner.app

    publishing:
      email:
        recipients:
          - hammad.ahmed0566@gmail.com
        notify:
          success: true
          failure: true
