workflows:

  ios-unsigned:
    name: iOS Unsigned (free, sign locally with Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.22.3
      xcode: 15.4
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          flutter precache --ios
          cd ios
          pod install --repo-update

      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r CryptoNexus-unsigned.ipa Payload/
          cp CryptoNexus-unsigned.ipa $CM_BUILD_DIR/
          echo "Unsigned IPA ready — download and sign with Sideloadly"

    artifacts:
      - CryptoNexus-unsigned.ipa
      - build/ios/iphoneos/Runner.app

    publishing:
      email:
        recipients:
          - hammad.ahmed0566@gmail.com
        notify:
          success: true
          failure: true
